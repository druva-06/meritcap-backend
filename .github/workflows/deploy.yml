name: Deploy Backend

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/cap-backend

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set environment
        id: env
        run: |
          echo "env=prod" >> $GITHUB_OUTPUT
          echo "vps_host=${{ secrets.PROD_VPS_HOST }}" >> $GITHUB_OUTPUT
          echo "namespace=prod" >> $GITHUB_OUTPUT

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push Docker image
        run: |
          docker build -t $REGISTRY/$IMAGE_NAME:${{ steps.env.outputs.env }}-${{ github.sha }} .
          docker tag $REGISTRY/$IMAGE_NAME:${{ steps.env.outputs.env }}-${{ github.sha }} \
                     $REGISTRY/$IMAGE_NAME:${{ steps.env.outputs.env }}-latest
          docker push $REGISTRY/$IMAGE_NAME:${{ steps.env.outputs.env }}-${{ github.sha }}
          docker push $REGISTRY/$IMAGE_NAME:${{ steps.env.outputs.env }}-latest

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ steps.env.outputs.vps_host }}
          username: deployer
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            microk8s kubectl set image deployment/cap-backend \
              cap-backend=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.env.outputs.env }}-${{ github.sha }} \
              -n ${{ steps.env.outputs.namespace }}
            microk8s kubectl rollout status deployment/cap-backend \
              -n ${{ steps.env.outputs.namespace }} --timeout=120s