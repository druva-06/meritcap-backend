apiVersion: apps/v1
kind: Deployment
metadata:
  name: cap-backend
  namespace: prod
  labels:
    app: cap-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cap-backend
  template:
    metadata:
      labels:
        app: cap-backend
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: cap-backend
          image: ghcr.io/druva-06/cap-backend:prod-latest
          ports:
            - containerPort: 8080
          envFrom:
            - secretRef:
                name: cap-backend-secrets
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /api/actuator/health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/actuator/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
